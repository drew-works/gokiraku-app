<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ごきらく亭 - スマホ注文</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="order-style.css">
    <script src="qrcode.min.js"></script>
</head>
<body>

    <div class="header">ごきらく亭 スマホ注文</div>
    <div class="table-number-display" id="table-display-bar">卓番号: 未設定 (URLを確認してください)</div>

    <div class="tabs" id="tabs-container"></div>
    <div id="menu-sections-container"></div>

    <div class="footer" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; height: 60px;">
        <div class="total-price" style="font-size: 16px;">選択中: <span id="items-count-display" style="font-weight:bold; color:#28a745; font-size:1.2em;">0</span> 品</div>
        <button id="main-action-btn" class="order-btn" style="margin:0; background:#6c757d;" onclick="handleMainAction()">メニューを選んでください</button>
    </div>

    <div id="toppingModal" class="modal">
        <div class="modal-content" style="max-height: 80vh; overflow-y: auto; text-align: left;">
            <h3 style="margin:0; color:#333;" id="topping-modal-title">トッピングの追加</h3>
            <p style="font-size:13px; color:#666; margin:5px 0 15px 0;">一緒に注文するトッピングを選んでください</p>
            <div id="topping-list-container" style="margin-bottom: 20px;"></div>
            <button class="order-btn" style="background:#28a745; width:100%; margin-bottom:10px;" onclick="closeToppingModal()">トッピングを確定する</button>
        </div>
    </div>

    <div id="drinkModal" class="modal">
        <div class="modal-content" style="max-height: 80vh; overflow-y: auto; text-align: left;">
            <h3 style="margin:0; color:#333;" id="drink-modal-title">ドリンクの選択</h3>
            <p style="font-size:13px; color:#666; margin:5px 0 15px 0;">サイズや種類を選んでください</p>
            <div id="drink-list-container" style="margin-bottom: 20px;"></div>
            <button class="order-btn" style="background:#28a745; width:100%; margin-bottom:10px;" onclick="closeDrinkModal()">メニューに戻る</button>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content" style="max-height: 80vh; overflow-y: auto; text-align: left;">
            <h3 style="margin:0; color:#333;">注文内容の確認</h3>
            <p style="font-size:13px; color:#666; margin:5px 0 15px 0;">ご注文内容にお間違いがないかご確認ください。</p>
            
            <div id="confirm-list-container" style="margin: 15px 0; border-top:1px solid #eee; border-bottom:1px solid #eee; padding:10px 0;"></div>
            
            <div style="font-size: 18px; font-weight: bold; text-align: right; margin-bottom: 20px;">
                今回の小計: ¥<span id="confirm-total-display">0</span>
            </div>

            <button class="order-btn" style="background:#28a745; width:100%; margin-bottom:10px;" onclick="generateOrderQR()">この内容で注文（QR作成）</button>
            <button class="close-btn" style="width:100%; background:#6c757d;" onclick="closeConfirmation()">修正する</button>
        </div>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-content">
            <h3 style="margin:0; color:#28a745;" id="modal-table-title">【店員スキャン用画面】</h3>
            <p style="font-size:13px; color:#666; margin:5px 0 15px 0;">この画面をそのまま店員に見せてください</p>
            <div id="qrcode" style="display:flex; justify-content:center; margin:15px 0;"></div>
            <button class="close-btn" onclick="closeQRAndReset()">画面を閉じる</button>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="modal-content" style="max-height: 80vh; overflow-y: auto; text-align: left;">
            <h3 style="margin:0; color:#17a2b8;">これまでの注文履歴</h3>
            <p style="font-size:13px; color:#666; margin:5px 0 15px 0;">これまでに注文が確定（QRスキャン）したメニューです。</p>
            
            <div id="history-list-container" style="margin: 15px 0; border-top:1px solid #eee; border-bottom:1px solid #eee; padding:10px 0;"></div>

            <button class="close-btn" style="width:100%; background:#6c757d;" onclick="closeHistoryModal()">メニューに戻る</button>
        </div>
    </div>

    <script src="order-menu-data.js"></script>
    <script src="staff-reset.js"></script>
    <script src="topping.js"></script>
    <script src="order-script.js"></script>
</body>
</html>
