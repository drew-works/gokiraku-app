        // IDから商品名を探し出す魔法の関数
        function getItemName(id) {
            for (const category in menuData) {
                const found = menuData[category].find(item => item.id === id);
                if (found) return found.name;
            }
            return "不明なメニュー (" + id + ")"; // 万が一見つからなかった時用
        }

        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let isScanning = true;

        // カメラ起動
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            requestAnimationFrame(tick);
        });

        function tick() {
            if (!isScanning) return;
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
                
                if (code && code.data) {
                    isScanning = false;
                    showResult(code.data);
                }
            }
            requestAnimationFrame(tick);
        }

        // 結果を表示する処理
        function showResult(qrText) {
            const orderList = document.getElementById("order-list");
            orderList.innerHTML = "";

            // 例: "o15:1,d2:2,sd4:1" を分解する
            const items = qrText.split(",");
            items.forEach(itemStr => {
                const [id, count] = itemStr.split(":");
                if (id && count) {
                    const itemName = getItemName(id); // ここでIDをメニュー名に変換！
                    const div = document.createElement("div");
                    div.className = "order-item";
                    div.innerText = `${itemName} × ${count}つ`;
                    orderList.appendChild(div);
                }
            });

            document.getElementById("result-box").style.display = "block";
        }

        function resetScan() {
            document.getElementById("result-box").style.display = "none";
            isScanning = true;
            requestAnimationFrame(tick);
        }
