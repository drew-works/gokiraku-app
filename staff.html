<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ごきらく亭 - 店員用スキャンアプリ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #222; color: white; padding: 20px; }
        #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 12px; overflow: hidden; }
        #result { margin-top: 20px; padding: 15px; background: white; color: black; border-radius: 8px; display: none; text-align: left; }
        .item-line { border-bottom: 1px dashed #ccc; padding: 5px 0; font-size: 18px; }
    </style>
</head>
<body>

    <h2>📱 店員専用スキャン画面</h2>
    <p style="color: #ccc;">お客さんのQRコードをカメラの枠内に収めてください</p>

    <div id="reader"></div>
    <div id="result"></div>

    <script>
        const resultDiv = document.getElementById('result');
        
        // メニューの日本語対応表
        const menuNames = {
            'butatama': '王道 豚玉',
            'modanyaki': 'イカモダン焼き',
            'mentai_monja': '明太もちチーズもんじゃ',
            'yakisoba': 'ソース焼きそば',
            'takoyaki': '大だこ焼き(6個)',
            'beer': '生ビール'
        };

        // スキャンに成功した時の処理
        function onScanSuccess(decodedText, decodedResult) {
            // 何度も読み込まないように一旦スキャンをストップ
            html5QrcodeScanner.clear();

            let html = "<h3 style='margin-top:0; color:#dc3545;'>🟢 注文を受信しました</h3>";
            const items = decodedText.split(',');
            
            items.forEach(item => {
                const [id, count] = item.split(':');
                const name = menuNames[id] || id;
                html += `<div class='item-line'><strong>${name}</strong> × ${count}つ</div>`;
            });

            html += `<br><button onclick="location.reload()" style="width:100%; padding:12px; font-weight:bold; background:#28a745; color:white; border:none; border-radius:5px; font-size:16px;">次のスキャンへ</button>`;
            
            resultDiv.innerHTML = html;
            resultDiv.style.display = "block";
        }

        // カメラの起動設定
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10,              // 1秒間に10回スキャンを試みる
                qrbox: { width: 250, height: 250 }, // 読み取り用の四角い枠のサイズ
                rememberLastUsedCamera: true
            }
        );
        
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
