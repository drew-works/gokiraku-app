<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ごきらく亭 - 店員用スキャンアプリ</title>
    <script src="jsQR.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #333; color: white; }
        #camera-view { width: 100%; max-width: 400px; height: 300px; background: #000; margin: 10px auto; border-radius: 10px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .order-card { background: white; color: black; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .order-title { font-size: 20px; font-weight: bold; border-bottom: 2px solid #333; padding-bottom: 5px; margin-bottom: 10px; }
        .item { font-size: 24px; font-weight: bold; margin: 10px 0; color: #dc3545; }
    </style>
</head>
<body>

    <h2>📱 店員専用スキャン画面</h2>
    <p>お客さんのQRコードをカメラにかざしてください</p>

    <div id="camera-view">
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="result-area" style="display: none;">
        <div class="order-card">
            <div class="order-title">🔥 届いた注文</div>
            <div id="order-items"></div>
            <button onclick="location.reload()" style="width:100%; padding:10px; margin-top:15px; font-weight:bold;">次の注文をスキャン</button>
        </div>
    </div>

    <script>
        // メニューのIDを日本語に翻訳するための辞書
        const itemTranslator = {
            butatama: '王道 豚玉',
            modanyaki: 'イカモダン焼き',
            mentai_monja: '明太もちチーズもんじゃ',
            yakisoba: 'ソース焼きそば',
            takoyaki: '大だこ焼き(6個)',
            beer: '生ビール'
        };

        const video = document.getElementById('video');
        const resultArea = document.getElementById('result-area');
        const orderItemsDiv = document.getElementById('order-items');

        // スマホのカメラを起動する
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
            video.srcObject = stream;
            requestAnimationFrame(tick);
        });

        // 毎フレーム、QRコードが映っていないかチェックする関数
        function tick() {
            if (video.readyState === video.HAVE_CURRENT_DATA) {
                // ビデオの映像を切り取って解析する準備
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // 🔍 QRコードを解析！
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                // もしQRコードが見つかったら！
                if (code) {
                    // 「ピッ」と音が鳴った風に、データを解読する
                    decodeOrder(code.data);
                    return; // スキャン成功したらループを抜ける
                }
            }
            requestAnimationFrame(tick);
        }

        // 宛先不明の暗号（butatama:2,beer:1）を解読する関数
        function decodeOrder(dataString) {
            // 念のため変なデータだったら無視する
            if(!dataString.includes(':')) return;

            orderItemsDiv.innerHTML = '';
            
            // "butatama:2,beer:1" をバラバラに分解する
            const pairs = dataString.split(',');
            pairs.forEach(pair => {
                const [id, count] = pair.split(':');
                const japaneseName = itemTranslator[id] || id; // 日本語に翻訳
                
                // 画面にクソデカ文字で追加
                orderItemsDiv.innerHTML += `<div class="item">・${japaneseName} × ${count}つ</div>`;
            });

            // 注文カードを表示する
            resultArea.style.display = 'block';
            
            // カメラのストップ
            video.srcObject.getTracks().forEach(track => track.stop());
        }
    </script>
</body>
</html>
